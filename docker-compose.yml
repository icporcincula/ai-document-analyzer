version: '3.8'

services:
  # Redis for rate limiting
  redis:
    image: redis:7-alpine
    container_name: document-analyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doc_analyzer_network
    command: redis-server --appendonly yes

  # Main FastAPI Application
  api:
    build: .
    container_name: document-analyzer-api
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_URL=${OPENAI_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - PRESIDIO_ANALYZER_URL=http://presidio-analyzer:3000
      - PRESIDIO_ANONYMIZER_URL=http://presidio-anonymizer:3000
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - API_KEY=${API_KEY}
      - ENABLE_AUTH=${ENABLE_AUTH:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      - RATE_LIMIT_REDIS_URL=redis://redis:6379/0
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED:-true}
      - AUDIT_LOG_FILE=/app/logs/audit.log
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ./logs:/app/logs
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - presidio-analyzer
      - presidio-anonymizer
      - redis
    networks:
      - doc_analyzer_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: document-analyzer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      - api
    networks:
      - doc_analyzer_network
    restart: unless-stopped

  # Presidio Analyzer
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: presidio-analyzer
    ports:
      - "5002:3000"
    networks:
      - doc_analyzer_network
    environment:
      - GRPC_PORT=3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Presidio Anonymizer
  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: presidio-anonymizer
    ports:
      - "5001:3000"
    networks:
      - doc_analyzer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: document-analyzer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - doc_analyzer_network
    depends_on:
      - api

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: document-analyzer-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - doc_analyzer_network
    depends_on:
      - prometheus

  # Frontend Web UI
  frontend:
    build: ./frontend
    container_name: document-analyzer-frontend
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_METRICS_URL=http://localhost:8000/metrics
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - doc_analyzer_network
    depends_on:
      - api

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  doc_analyzer_network:
    driver: bridge
